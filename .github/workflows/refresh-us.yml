name: refresh-us

# 米国株 深掘りスナップショット（上位銘柄∪お気に入り）を再計算してSupabaseに保存。
# 平日 21:30 UTC（米国引け 16:00 ET の少し後。EDT/EST両対応の安全帯）。手動実行も可。
on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  refresh-us:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh:us
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
