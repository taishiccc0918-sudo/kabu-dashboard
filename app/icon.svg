<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="株式ウォッチ">
  <defs>
    <linearGradient id="ring" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="#0d1117"/>
  <!-- 縁＝つながりの円（少し開いた輪で「縁を結ぶ」余白を表現） -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="url(#ring)" stroke-width="4.5"
          stroke-linecap="round" stroke-dasharray="104 30" transform="rotate(125 32 32)"/>
  <!-- 株価の上昇ライン＋着目点（ウォッチ） -->
  <polyline points="21,40 28,32 34,36 43,23" fill="none" stroke="#34d399"
            stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="43" cy="23" r="3.6" fill="#34d399"/>
</svg>
